name: Deploy sync Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "sync-worker/**"
      - ".github/workflows/deploy-sync-worker.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Cloudflare configuration
        id: cloudflare-config
        env:
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ vars.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_KV_NAMESPACE_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare sync deployment skipped. Add CLOUDFLARE_KV_NAMESPACE_ID, CLOUDFLARE_API_TOKEN, and CLOUDFLARE_ACCOUNT_ID to enable it."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure KV namespace
        if: steps.cloudflare-config.outputs.configured == 'true'
        env:
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ vars.CLOUDFLARE_KV_NAMESPACE_ID }}
        run: |
          sed "s/CLOUDFLARE_KV_NAMESPACE_ID/$CLOUDFLARE_KV_NAMESPACE_ID/" sync-worker/wrangler.toml > sync-worker/wrangler.deploy.toml

      - name: Deploy Worker
        if: steps.cloudflare-config.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: sync-worker
          command: deploy --config wrangler.deploy.toml
