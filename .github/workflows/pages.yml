name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Configure optional cloud sync endpoint
        env:
          HEART_SOUL_SYNC_ENDPOINT: ${{ vars.HEART_SOUL_SYNC_ENDPOINT }}
        run: |
          node -e "require('fs').writeFileSync('sync-config.js', 'window.HEART_SOUL_SYNC_ENDPOINT = ' + JSON.stringify(process.env.HEART_SOUL_SYNC_ENDPOINT || '') + ';\n')"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
